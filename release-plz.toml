[workspace]
changelog_update = true
git_release_enable = false
git_tag_enable = false

# ── Core lib: publish to crates.io, tag for tracking ─────
[[package]]
name = "claude-deck-core"
publish = true
git_tag_enable = true
git_tag_name = "core-v{{ version }}"

# ── CLI: publish to crates.io, tag triggers binary builds ─
[[package]]
name = "claude-deck-cli"
publish = true
git_tag_enable = true
git_tag_name = "cli-v{{ version }}"
git_release_enable = true
git_release_name = "CLI v{{ version }}"

# ── App: excluded from release-plz ────────────────────────
# Tauri's build.rs generates platform-specific files in gen/schemas/
# outside OUT_DIR, which makes cargo package --verify fail.
# App releases are handled manually: create tag app-vX.Y.Z → triggers
# the release-app workflow.
[[package]]
name = "claude-deck-app"
release = false
