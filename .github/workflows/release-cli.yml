name: Release CLI

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: CLI (${{ matrix.target }})
    if: startsWith(github.event.release.tag_name, 'cli-v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - run: cargo build --release --target ${{ matrix.target }} -p claude-deck-cli

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../claude-deck-${{ matrix.target }}.tar.gz claude-deck

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: claude-deck-${{ matrix.target }}.tar.gz

  update-tap:
    name: Update Homebrew tap
    needs: build
    runs-on: macos-latest
    steps:
      - name: Update formula
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#cli-v}"

          # Download all CLI tarballs
          gh release download "$TAG" --repo ThomasTartrau/claude-deck --pattern "claude-deck-*.tar.gz" --dir "$RUNNER_TEMP"

          # Compute SHA256 for each target
          SHA_MACOS_ARM=$(shasum -a 256 "$RUNNER_TEMP/claude-deck-aarch64-apple-darwin.tar.gz" | cut -d' ' -f1)
          SHA_MACOS_X64=$(shasum -a 256 "$RUNNER_TEMP/claude-deck-x86_64-apple-darwin.tar.gz" | cut -d' ' -f1)
          SHA_LINUX_ARM=$(shasum -a 256 "$RUNNER_TEMP/claude-deck-aarch64-unknown-linux-gnu.tar.gz" | cut -d' ' -f1)
          SHA_LINUX_X64=$(shasum -a 256 "$RUNNER_TEMP/claude-deck-x86_64-unknown-linux-gnu.tar.gz" | cut -d' ' -f1)

          cat > "$RUNNER_TEMP/claude-deck.rb" <<FORMULA
          class ClaudeDeck < Formula
            desc "TUI dashboard to manage multiple Claude Code sessions via tmux"
            homepage "https://github.com/ThomasTartrau/claude-deck"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/ThomasTartrau/claude-deck/releases/download/cli-v#{version}/claude-deck-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_MACOS_ARM}"
              else
                url "https://github.com/ThomasTartrau/claude-deck/releases/download/cli-v#{version}/claude-deck-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_MACOS_X64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/ThomasTartrau/claude-deck/releases/download/cli-v#{version}/claude-deck-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX_ARM}"
              else
                url "https://github.com/ThomasTartrau/claude-deck/releases/download/cli-v#{version}/claude-deck-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX_X64}"
              end
            end

            depends_on "tmux"

            def install
              bin.install "claude-deck"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/claude-deck --version")
            end
          end
          FORMULA

          # Remove leading whitespace from heredoc
          sed -i '' 's/^          //' "$RUNNER_TEMP/claude-deck.rb"

          CONTENT=$(base64 -i "$RUNNER_TEMP/claude-deck.rb")
          FILE_SHA=$(GH_TOKEN="$HOMEBREW_TAP_TOKEN" gh api repos/ThomasTartrau/homebrew-claude-deck/contents/Formula/claude-deck.rb --jq '.sha' 2>/dev/null || echo "")

          if [ -n "$FILE_SHA" ]; then
            GH_TOKEN="$HOMEBREW_TAP_TOKEN" gh api repos/ThomasTartrau/homebrew-claude-deck/contents/Formula/claude-deck.rb \
              --method PUT \
              -f message="Update claude-deck CLI to v${VERSION}" \
              -f sha="$FILE_SHA" \
              -f content="$CONTENT"
          else
            GH_TOKEN="$HOMEBREW_TAP_TOKEN" gh api repos/ThomasTartrau/homebrew-claude-deck/contents/Formula/claude-deck.rb \
              --method PUT \
              -f message="Add claude-deck CLI v${VERSION}" \
              -f content="$CONTENT"
          fi
